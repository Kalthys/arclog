name: Arclog — Build Android, Linux & Windows

on:
  push:
    branches: [ main, master ]
  # Déclencher manuellement depuis l'onglet Actions GitHub
  workflow_dispatch:

jobs:

  # ── Build APK Android ────────────────────────────────────────────────────────
  build-android:
    name: 📱 APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurer Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Accepter les licences Android SDK
        run: yes | flutter doctor --android-licenses || true

      - name: Compiler l'APK Release
        run: flutter build apk --release

      - name: Uploader l'APK
        uses: actions/upload-artifact@v4
        with:
          name: Arclog-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Build Linux .tar.gz ──────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Exécutable Linux
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les dépendances système Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev

      - name: Configurer Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Activer le support Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Installer les dépendances
        run: flutter pub get

      - name: Compiler l'exécutable Linux
        run: flutter build linux --release

      - name: Archiver le build Linux
        run: |
          tar -czf Arclog-Linux.tar.gz \
            -C build/linux/x64/release/bundle .

      - name: Uploader le build Linux
        uses: actions/upload-artifact@v4
        with:
          name: Arclog-Linux-Bundle
          path: Arclog-Linux.tar.gz
          retention-days: 30

  # ── Build Windows .exe ───────────────────────────────────────────────────────
  build-windows:
    name: 🖥️ Exécutable Windows
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Activer le support Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Installer les dépendances
        run: flutter pub get

      - name: Compiler l'exécutable Windows
        run: flutter build windows --release

      - name: Zipper le build Windows
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "Arclog-Windows.zip"
        shell: powershell

      - name: Uploader le build Windows
        uses: actions/upload-artifact@v4
        with:
          name: Arclog-Windows-EXE
          path: Arclog-Windows.zip
          retention-days: 30
